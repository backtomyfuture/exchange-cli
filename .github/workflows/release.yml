name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-platform:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-arm64
            runner: macos-latest
            python-version: "3.12"
          - platform: darwin-x64
            runner: macos-13
            python-version: "3.12"
          - platform: linux-x64
            runner: ubuntu-latest
            python-version: "3.12"
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
            python-version: "3.12"
          - platform: win32-x64
            runner: windows-latest
            python-version: "3.12"
          - platform: win32-ia32
            runner: windows-latest
            python-version: "3.12"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.platform == 'win32-ia32' && 'x86' || '' }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: python -m pip install --upgrade pip
      - run: pip install -e . pyinstaller
      - run: python scripts/prepare_platform_package.py --platform ${{ matrix.platform }}
      - run: cd npm/platforms/${{ matrix.platform }} && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-npm:
    runs-on: ubuntu-latest
    needs: build-platform
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: cd npm/exchange-cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
